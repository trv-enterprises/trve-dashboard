services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: dashboard-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=dashboard
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashboard-network

  # Go Server (for production/testing - commented out for local dev)
  # server:
  #   build:
  #     context: ./server-go
  #     dockerfile: Dockerfile
  #   container_name: dashboard-server
  #   ports:
  #     - "3001:3001"
