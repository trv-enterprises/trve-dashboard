  #     - ENV=development
  #     - DASHBOARD_MONGODB_URI=mongodb://mongodb:27017
  #   depends_on:
  #     mongodb:
  #       condition: service_healthy
  #   networks:
  #     - dashboard-network
  #   volumes:
  #     - ./server-go/config:/app/config:ro

volumes:
  mongodb-data:
    driver: local

networks:
  dashboard-network:
    driver: bridge
