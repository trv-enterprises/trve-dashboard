version: '3.8'

services:
  # PostgreSQL database with timeseries data
  postgres:
    image: postgres:15-alpine
    container_name: sensor-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sensors
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-seed/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - simulator-net

  # Database seeder - seeds historical data
  db-seeder:
    build:
      context: .
      dockerfile: Dockerfile.seeder
    container_name: sensor-db-seeder
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: sensors
      NUM_SENSORS: ${NUM_SENSORS:-10}
      DAYS_BACK: ${DAYS_BACK:-7}
      INTERVAL_SECONDS: ${INTERVAL_SECONDS:-60}
    networks:
      - simulator-net

  # WebSocket sensor simulator
  websocket-simulator:
    build:
      context: .
      dockerfile: Dockerfile.websocket
    container_name: sensor-websocket
    ports:
      - "8081:8081"
    environment:
      WS_PORT: 8081
      WS_INTERVAL_MS: ${WS_INTERVAL_MS:-1000}
      WS_NUM_SENSORS: ${WS_NUM_SENSORS:-20}
      WS_ENABLE_NOISE: ${WS_ENABLE_NOISE:-true}
      WS_ANOMALY_RATE: ${WS_ANOMALY_RATE:-0.02}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - simulator-net

  # REST API sensor simulator
  rest-api-simulator:
    build:
      context: .
      dockerfile: Dockerfile.restapi
    container_name: sensor-rest-api
    ports:
      - "8082:8082"
    environment:
      API_PORT: 8082
      API_BUFFER_SIZE: ${API_BUFFER_SIZE:-1000}
      API_GENERATE_MS: ${API_GENERATE_MS:-5000}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - simulator-net

  # Static file server for CSV
  csv-server:
    image: nginx:alpine
    container_name: sensor-csv-server
    ports:
      - "8083:80"
    volumes:
      - ./data:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - simulator-net

volumes:
  postgres_data:

networks:
  simulator-net:
    driver: bridge
