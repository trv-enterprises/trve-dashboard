# Docker Compose for deploying from registry images
# Usage: docker compose -f docker-compose.deploy.yml up -d
#
# Required environment variables (in .env file):
#   ANTHROPIC_API_KEY - API key for AI features
#   DOMAIN - Domain for HTTPS (e.g., dashboard.example.com or localhost)
#   IMAGE_TAG - Version tag to deploy (e.g., v0.2.0 or latest)

version: '3.8'

services:
  caddy:
    image: 100.127.19.27:5000/dashboard-client:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    image: 100.127.19.27:5000/dashboard-server:${IMAGE_TAG:-latest}
    expose:
      - "3001"
    environment:
      - DASHBOARD_SERVER_MODE=release
      - DASHBOARD_SERVER_HOST=0.0.0.0
      - DASHBOARD_MONGODB_URI=mongodb://mongodb:27017
      - DASHBOARD_MONGODB_DATABASE=dashboard
      - DASHBOARD_LLM_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongodb_data:
  caddy_data:
  caddy_config:
