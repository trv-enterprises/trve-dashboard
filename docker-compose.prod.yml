version: '3.8'

services:
  caddy:
    build: ./client
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    build: ./server-go
    expose:
      - "3001"
    environment:
      - DASHBOARD_SERVER_MODE=release
      - DASHBOARD_SERVER_HOST=0.0.0.0
      - DASHBOARD_MONGODB_URI=mongodb://mongodb:27017
      - DASHBOARD_MONGODB_DATABASE=dashboard
      - DASHBOARD_REDIS_ADDR=redis:6379
      - DASHBOARD_LLM_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
  caddy_data:
  caddy_config:
