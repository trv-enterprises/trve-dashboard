# Base configuration - defaults for development
server:
  port: 3001
  host: 0.0.0.0
  mode: debug  # debug, release
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 10s

mongodb:
  uri: mongodb://localhost:27017
  database: dashboard
  connection_timeout: 10s
  max_pool_size: 100
  min_pool_size: 10

asynq:
  concurrency: 10
  queues:
    critical: 6
    default: 3
    low: 1
  retry_max_attempts: 3
  shutdown_timeout: 10s

websocket:
  read_buffer_size: 1024
  write_buffer_size: 1024
  ping_interval: 30s
  pong_wait: 60s
  write_wait: 10s

llm:
  provider: anthropic  # anthropic, openai
  api_key: ""  # Set via DASHBOARD_LLM_API_KEY
  model: claude-sonnet-4-5
  max_tokens: 4096
  temperature: 0.7
  timeout: 120s
  base_url: https://api.anthropic.com/v1

validation:
  max_code_size: 100000  # bytes
  dangerous_patterns:
    - eval
    - Function
    - innerHTML
    - dangerouslySetInnerHTML
    - import.*http
    - require\(
    - process\.
    - __dirname
    - __filename
  allowed_imports:
    - react
    - echarts
    - echarts-for-react
    - "@carbon/react"
    - "@carbon/icons-react"

dashboard:
  config_refresh_interval: 120  # seconds - how often to refresh dashboard/chart config from database

layout:
  spacing: 32  # pixels - $spacing-08
  max_width: 1920
  max_height: 1080
  default_panel_width: 320
  default_panel_height: 256
  min_panel_width: 160
  min_panel_height: 160
  max_panel_width: 1280
  max_panel_height: 1280

layout_dimensions: # first item will be the default for new dashboards
  1728x1117-MAC: {max_width: 1728, max_height: 1117}
  1920x1080-HD: {max_width: 1920, max_height: 1080} # Full HD
  2056x1329: {max_width: 2056, max_height: 1329}
  2560×1440-2k: {max_width: 2560, max_height: 1440} # (QHD/2K)
  2992x1934: {max_width: 3008, max_height: 1934}
  3456x2160: {max_width: 3456, max_height: 2160}
  3840×2160-4k: {max_width: 3840, max_height: 2160}

logging:
  level: debug  # debug, info, warn, error
  format: text  # text, json
  output: stdout  # stdout, file
  file_path: /var/log/dashboard/app.log

cors:
  allowed_origins:
    - http://localhost:5173
    - http://localhost:3000
    - http://100.127.19.27:5173  # Tailscale - this machine
    - http://100.64.0.0:5173     # Tailscale range placeholder
    - "*"                         # Allow all origins for Tailscale network
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    - PATCH
  allowed_headers:
    - Origin
    - Content-Type
    - Authorization
    - Accept
    - X-User-ID
  expose_headers:
    - Content-Length
  allow_credentials: true
  max_age: 3600

swagger:
  enabled: true
  title: GiVi-Solution Dashboard API
  version: 1.0.0
  description: Dashboard system with AI-powered chart generation
  host: localhost:3001
  base_path: /api
  schemes:
    - http
  contact_name: Dashboard Team
  contact_email: support@example.com

# Static file serving for production (SPA)
# In development, use Vite dev server (npm run dev) for hot module replacement
# In production, build the client (npm run build) and enable this
static_files:
  enabled: false  # Set to true in production, or via DASHBOARD_STATIC_FILES_ENABLED=true
  path: ../client/dist  # Path to built React app (relative to server-go directory)

# Settings that are synced to MongoDB on startup
# - hidden: true means the setting always reloads from this file on restart (not editable in UI)
# - hidden: false (default) means the setting persists in MongoDB and is editable in UI
# - If you change hidden from false to true, the value from this file will take precedence
settings:
  - key: layout_dimensions
    category: layout
    description: "Available dashboard layout dimension presets"
    hidden: true
    value:
      - name: "1728x1117-MAC"
        max_width: 1728
        max_height: 1117
      - name: "1920x1080-HD"
        max_width: 1920
        max_height: 1080
      - name: "2056x1329"
        max_width: 2056
        max_height: 1329
      - name: "2560x1440-2K"
        max_width: 2560
        max_height: 1440
      - name: "2992x1934"
        max_width: 3008
        max_height: 1934
      - name: "3456x2160"
        max_width: 3456
        max_height: 2160
      - name: "3840x2160-4K"
        max_width: 3840
        max_height: 2160

  - key: config_refresh_interval
    category: dashboard
    description: "How often (in seconds) the frontend should refresh dashboard/chart config from the database"
    hidden: false
    value: 120

  - key: default_layout_dimension
    category: layout
    description: "Default layout dimension for new dashboards"
    hidden: false
    value: "1728x1117-MAC"

  - key: max_code_size
    category: validation
    description: "Maximum allowed size (in bytes) for component code"
    hidden: true
    value: 100000

  - key: dangerous_patterns
    category: validation
    description: "Regex patterns that are not allowed in component code"
    hidden: true
    value:
      - "eval"
      - "Function"
      - "innerHTML"
      - "dangerouslySetInnerHTML"
      - "import.*http"
      - "require\\("
      - "process\\."
      - "__dirname"
      - "__filename"

  - key: allowed_imports
    category: validation
    description: "Allowed import packages for component code"
    hidden: true
    value:
      - "react"
      - "echarts"
      - "echarts-for-react"
      - "@carbon/react"
      - "@carbon/icons-react"
