    properties:
      params:
        additionalProperties: true
        description: Query parameters
        type: object
      raw:
        description: SQL query, filter, or API path
        type: string
      type:
        description: sql, csv_filter, stream_filter, api
        type: string
    type: object
  models.ChartSummary:
    description: Minimal chart info for selection cards and lists
    properties:
      chart_type:
        type: string
      datasource_id:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
      tags:
        items:
          type: string
        type: array
      thumbnail:
        type: string
      version:
        type: integer
    type: object
  models.ChartVersionInfo:
    description: Version info for a chart
    properties:
      has_draft:
        description: Whether a draft version exists
