basePath: /api
definitions:
  github_com_tviviano_dashboard_internal_models.AIMessage:
    description: A message in the AI conversation
    properties:
      content:
        type: string
      id:
        type: string
      role:
        description: '"user" | "assistant" | "system"'
        type: string
      timestamp:
        type: string
      tool_calls:
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ToolCall'
        type: array
    type: object
  github_com_tviviano_dashboard_internal_models.AISession:
    description: AI session for chart creation/editing
    properties:
      chart_id:
        description: Chart UUID being edited
        type: string
      chart_version:
        description: Version being edited (always a draft)
        type: integer
      created:
        type: string
      id:
        description: UUID
        type: string
      messages:
        description: Conversation history
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.AIMessage'
        type: array
      status:
        description: '"active" | "completed" | "cancelled"'
        type: string
      updated:
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.AISessionResponse:
    description: Response containing AI session state
    properties:
      chart:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.Chart'
        description: Current chart state (draft)
      session:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.AISession'
    type: object
  github_com_tviviano_dashboard_internal_models.APIConfig:
    properties:
      auth_credentials:
        additionalProperties:
          type: string
        type: object
      auth_type:
        description: none, bearer, basic, api-key
        type: string
      body:
        description: Request body template
        type: string
      headers:
        additionalProperties:
          type: string
        description: Request headers
        type: object
      method:
        description: HTTP method (GET, POST, etc.)
        type: string
      query_params:
        additionalProperties:
          type: string
        description: Query parameters
        type: object
      response_config:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.APIResponseConfig'
        description: Response parsing config
      retry_count:
        type: integer
      retry_delay:
        description: milliseconds
        type: integer
      timeout:
        description: seconds
        type: integer
      url:
        description: Full API endpoint URL
        type: string
    required:
    - url
    type: object
  github_com_tviviano_dashboard_internal_models.APIResponseConfig:
    properties:
      data_path:
        description: |-
          DataPath is the JSON path to the array of records (e.g., "data", "results", "items")
          If empty, assumes response is already an array or will be parsed as key-value pairs
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.CSVConfig:
    properties:
      columns:
        description: explicit column names
        items:
          type: string
        type: array
      delimiter:
        description: 'default: ","'
        type: string
      encoding:
        description: utf-8, ascii, etc.
        type: string
      has_header:
        description: 'default: true'
        type: boolean
      path:
        type: string
      watch_changes:
        type: boolean
    required:
    - path
    type: object
  github_com_tviviano_dashboard_internal_models.Capability:
    enum:
    - view
    - design
    - manage
    type: string
    x-enum-varnames:
    - CapabilityView
    - CapabilityDesign
    - CapabilityManage
  github_com_tviviano_dashboard_internal_models.Chart:
    description: Chart with data source binding, query config, and visualization settings
    properties:
      ai_session_id:
        description: Active AI session (drafts only)
        type: string
      chart_type:
        description: bar, line, pie, gauge, etc.
        type: string
      component_code:
        description: React component code
        type: string
      created:
        type: string
      data_mapping:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ChartDataMapping'
        description: How to map data to chart
      datasource_id:
        description: Reference to data source
        type: string
      description:
        type: string
      id:
        description: UUID - same across versions
        type: string
      name:
        description: Unique identifier
        type: string
      options:
        additionalProperties: true
        description: ECharts options overrides
        type: object
      query_config:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ChartQueryConfig'
        description: How to query data
      status:
        description: '"draft" | "final"'
        type: string
      tags:
        description: Searchable tags
        items:
          type: string
        type: array
      thumbnail:
        description: Base64 preview image for card display
        type: string
      title:
        description: Display title (defaults to Name if empty)
        type: string
      updated:
        type: string
      use_custom_code:
        description: Whether custom code mode is enabled
        type: boolean
      version:
        description: Version number (1, 2, 3...)
        type: integer
    required:
    - name
    type: object
  github_com_tviviano_dashboard_internal_models.ChartDataMapping:
    description: Mapping configuration from data columns to chart axes/series
    properties:
      aggregation:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DataAggregation'
        description: Aggregation to apply (first, last, avg, etc.)
      filters:
        description: Client-side filters applied after data fetch
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DataFilter'
        type: array
      group_by:
        description: Column to group/split series by (client-side grouping)
        type: string
      label_col:
        description: Column for labels
        type: string
      limit:
        description: Max rows to return
        type: integer
      series:
        description: Column that identifies each series (e.g., "location") - used
          for time bucket partitioning
        type: string
      sliding_window:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.SlidingWindow'
        description: Time-based sliding window (e.g., last 5 minutes)
      sort_by:
        description: Column to sort by
        type: string
      sort_order:
        description: asc or desc
        type: string
      time_bucket:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.TimeBucket'
        description: Time-bucketed aggregation for streaming data
      x_axis:
        description: Column for X axis (categories)
        type: string
      x_axis_format:
        description: 'Format for X axis values: chart, chart_time, chart_date, chart_datetime,
          short, long, etc.'
        type: string
      x_axis_label:
        description: Label for X axis (e.g., "Time", "Date")
        type: string
      y_axis:
        description: Columns for Y axis (values/series)
        items:
          type: string
        type: array
      y_axis_label:
        description: Label for Y axis (e.g., "Temperature (°F)", "Count")
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.ChartListResponse:
    description: Response containing a list of charts with pagination
    properties:
      charts:
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.Chart'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.ChartQueryConfig:
    description: Query configuration for fetching chart data
    properties:
      params:
        additionalProperties: true
        description: Query parameters
        type: object
      raw:
        description: SQL query, filter, or API path
        type: string
      type:
        description: sql, csv_filter, stream_filter, api
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.ChartSummary:
    description: Minimal chart info for selection cards and lists
    properties:
      chart_type:
        type: string
      datasource_id:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
      tags:
        items:
          type: string
        type: array
      thumbnail:
        type: string
      version:
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.ChartVersionInfo:
    description: Version info for a chart
    properties:
      has_draft:
        description: Whether a draft version exists
        type: boolean
      id:
        type: string
      status:
        type: string
      version:
        type: integer
      version_count:
        description: Total versions for this chart id
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.ColumnInfo:
    properties:
      default:
        description: Default value if any
        type: string
      name:
        description: Column name
        type: string
      nullable:
        description: Whether column allows NULL
        type: boolean
      primary_key:
        description: Whether column is part of primary key
        type: boolean
      type:
        description: Data type (e.g., "varchar", "integer")
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.ConfigItem:
    properties:
      category:
        description: Grouping category (e.g., "layout")
        type: string
      created:
        type: string
      description:
        description: Human-readable description
        type: string
      id:
        description: Unique key (e.g., "layout_dimensions")
        type: string
      key:
        description: Same as ID, for clarity
        type: string
      updated:
        type: string
      value:
        description: The setting value
    type: object
  github_com_tviviano_dashboard_internal_models.CreateAISessionRequest:
    description: Request body for creating a new AI session
    properties:
      chart_id:
        description: Existing chart ID to edit (optional, omit for new chart)
        type: string
      initial_message:
        description: First user message (optional)
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.CreateChartRequest:
    description: Request body for creating a new chart
    properties:
      chart_type:
        type: string
      component_code:
        type: string
      data_mapping:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ChartDataMapping'
      datasource_id:
        type: string
      description:
        type: string
      name:
        type: string
      options:
        additionalProperties: true
        type: object
      query_config:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ChartQueryConfig'
      tags:
        items:
          type: string
        type: array
      thumbnail:
        type: string
      title:
        type: string
      use_custom_code:
        type: boolean
    required:
    - name
    type: object
  github_com_tviviano_dashboard_internal_models.CreateDashboardRequest:
    description: Request body for creating a new dashboard
    properties:
      description:
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        type: string
      panels:
        description: Panels with optional chart_id
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DashboardPanel'
        type: array
      settings:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DashboardSettings'
    required:
    - name
    type: object
  github_com_tviviano_dashboard_internal_models.CreateDatasourceRequest:
    properties:
      config:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DatasourceConfig'
      description:
        type: string
      mask_secrets:
        description: 'If true, secrets are masked in API responses (default: true)'
        type: boolean
      name:
        type: string
      tags:
        items:
          type: string
        type: array
      type:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DatasourceType'
        enum:
        - sql
        - csv
        - socket
        - api
        - tsstore
        - prometheus
        - edgelake
    required:
    - config
    - name
    - type
    type: object
  github_com_tviviano_dashboard_internal_models.CreateUserRequest:
    description: Request body for creating a new user
    properties:
      capabilities:
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.Capability'
        type: array
      email:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  github_com_tviviano_dashboard_internal_models.Dashboard:
    description: Dashboard with panels that reference standalone charts
    properties:
      created:
        type: string
      description:
        type: string
      id:
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        type: string
      panels:
        description: Panels with chart_id references
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DashboardPanel'
        type: array
      settings:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DashboardSettings'
      thumbnail:
        description: Base64 encoded thumbnail image
        type: string
      updated:
        type: string
    required:
    - name
    type: object
  github_com_tviviano_dashboard_internal_models.DashboardListResponse:
    description: Response containing a list of dashboards with pagination
    properties:
      dashboards:
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.Dashboard'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.DashboardPanel:
    description: Panel position and size in the grid with optional chart reference
    properties:
      chart_id:
        description: Reference to chart
        type: string
      h:
        type: integer
      id:
        type: string
      w:
        type: integer
      x:
        type: integer
      "y":
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.DashboardSettings:
    description: Dashboard settings and preferences
    properties:
      allow_export:
        type: boolean
      default_view:
        type: string
      is_public:
        type: boolean
      layout_dimension:
        type: string
      refresh_interval:
        type: integer
      theme:
        type: string
      timezone:
        type: string
      title_scale:
        description: Title font scale % (default 100, range 50-200)
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.DashboardSummary:
    description: Dashboard info with optional data source names for display in tiles
    properties:
      created:
        type: string
      datasource_names:
        description: Unique data source names used by charts
        items:
          type: string
        type: array
      description:
        type: string
      id:
        type: string
      name:
        type: string
      panel_count:
        type: integer
      settings:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DashboardSettings'
      thumbnail:
        type: string
      updated:
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.DashboardSummaryListResponse:
    description: Response containing dashboard summaries with optional data source
      info
    properties:
      dashboards:
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DashboardSummary'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.DataAggregation:
    description: Aggregation configuration for data transformation
    properties:
      count:
        description: Row count (for limit)
        type: integer
      field:
        description: Column to aggregate (for min/max/avg/sum)
        type: string
      sort_by:
        description: Column to sort by (for first/last)
        type: string
      type:
        description: first, last, min, max, avg, sum, count, limit
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.DataFilter:
    description: Filter condition for data transformation
    properties:
      field:
        description: Column name to filter on
        type: string
      op:
        description: 'Operator: eq, neq, gt, gte, lt, lte, contains, in, notIn, isNull,
          isNotNull'
        type: string
      value:
        description: Value to compare against (can be array for 'in' operator)
    type: object
  github_com_tviviano_dashboard_internal_models.Datasource:
    properties:
      config:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DatasourceConfig'
      created_at:
        type: string
      description:
        type: string
      health:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.HealthInfo'
      id:
        type: string
      mask_secrets:
        description: If true, secrets are masked in API responses
        type: boolean
      name:
        type: string
      tags:
        items:
          type: string
        type: array
      type:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DatasourceType'
        enum:
        - sql
        - csv
        - socket
        - api
        - tsstore
        - prometheus
        - edgelake
      updated_at:
        type: string
    required:
    - config
    - name
    - type
    type: object
  github_com_tviviano_dashboard_internal_models.DatasourceConfig:
    properties:
      api:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.APIConfig'
      csv:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.CSVConfig'
      edgelake:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.EdgeLakeConfig'
      prometheus:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.PrometheusConfig'
      socket:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.SocketConfig'
      sql:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.SQLConfig'
      tsstore:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.TSStoreConfig'
    type: object
  github_com_tviviano_dashboard_internal_models.DatasourceType:
    enum:
    - sql
    - csv
    - socket
    - api
    - tsstore
    - prometheus
    - edgelake
    type: string
    x-enum-varnames:
    - DatasourceTypeSQL
    - DatasourceTypeCSV
    - DatasourceTypeSocket
    - DatasourceTypeAPI
    - DatasourceTypeTSStore
    - DatasourceTypePrometheus
    - DatasourceTypeEdgeLake
  github_com_tviviano_dashboard_internal_models.EdgeLakeConfig:
    properties:
      host:
        description: EdgeLake node IP/hostname
        type: string
      port:
        description: 'REST API port (default: 32049)'
        type: integer
      timeout:
        description: 'Request timeout in seconds (default: 20)'
        type: integer
      use_distributed_query:
        description: 'Add "destination: network" header'
        type: boolean
    required:
    - host
    - port
    type: object
  github_com_tviviano_dashboard_internal_models.HealthInfo:
    properties:
      error_message:
        type: string
      last_check:
        type: string
      last_success:
        type: string
      response_time:
        description: milliseconds
        type: integer
      status:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.HealthStatus'
    type: object
  github_com_tviviano_dashboard_internal_models.HealthStatus:
    enum:
    - unknown
    - healthy
    - unhealthy
    - degraded
    type: string
    x-enum-varnames:
    - HealthStatusUnknown
    - HealthStatusHealthy
    - HealthStatusUnhealthy
    - HealthStatusDegraded
  github_com_tviviano_dashboard_internal_models.LayoutDimensionDTO:
    properties:
      max_height:
        type: integer
      max_width:
        type: integer
      name:
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.PrometheusConfig:
    properties:
      password:
        description: Basic auth password (optional)
        type: string
      timeout:
        description: 'Query timeout in seconds (default: 30)'
        type: integer
      url:
        description: Prometheus server URL (e.g., "http://localhost:9090")
        type: string
      username:
        description: Basic auth username (optional)
        type: string
    required:
    - url
    type: object
  github_com_tviviano_dashboard_internal_models.PrometheusMetricInfo:
    properties:
      help:
        description: Description from metadata
        type: string
      labels:
        description: Labels seen with this metric
        items:
          type: string
        type: array
      name:
        description: Metric name (e.g., "http_requests_total")
        type: string
      type:
        description: 'Metric type: "counter", "gauge", "histogram", "summary"'
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.PrometheusSchemaInfo:
    properties:
      labels:
        description: All label names
        items:
          type: string
        type: array
      metrics:
        description: Available metrics
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.PrometheusMetricInfo'
        type: array
    type: object
  github_com_tviviano_dashboard_internal_models.Query:
    properties:
      params:
        additionalProperties: true
        description: Query parameters
        type: object
      raw:
        description: Raw query string (SQL, filter expression, etc.)
        type: string
      type:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.QueryType'
        description: Query type
    type: object
  github_com_tviviano_dashboard_internal_models.QueryRequest:
    properties:
      query:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.Query'
    required:
    - query
    type: object
  github_com_tviviano_dashboard_internal_models.QueryResponse:
    properties:
      duration:
        description: milliseconds
        type: integer
      error:
        type: string
      result_set:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ResultSet'
      success:
        type: boolean
    type: object
  github_com_tviviano_dashboard_internal_models.QueryType:
    enum:
    - sql
    - csv_filter
    - stream_filter
    - api
    - tsstore
    - prometheus
    - edgelake
    type: string
    x-enum-varnames:
    - QueryTypeSQL
    - QueryTypeCSVFilter
    - QueryTypeStreamFilter
    - QueryTypeAPI
    - QueryTypeTSStore
    - QueryTypePrometheus
    - QueryTypeEdgeLake
  github_com_tviviano_dashboard_internal_models.ResultSet:
    properties:
      columns:
        description: Column names
        items:
          type: string
        type: array
      metadata:
        additionalProperties: true
        description: Additional metadata
        type: object
      rows:
        description: Data rows
        items:
          items: {}
          type: array
        type: array
    type: object
  github_com_tviviano_dashboard_internal_models.SQLConfig:
    properties:
      database:
        type: string
      driver:
        enum:
        - postgres
        - mysql
        - sqlite
        - mssql
        - oracle
        type: string
      host:
        type: string
      max_connections:
        type: integer
      options:
        description: Optional connection parameters (e.g., "sslmode=require&connect_timeout=10")
        type: string
      password:
        type: string
      port:
        type: integer
      ssl:
        type: boolean
      timeout:
        description: seconds
        type: integer
      username:
        type: string
    required:
    - driver
    type: object
  github_com_tviviano_dashboard_internal_models.SchemaInfo:
    properties:
      database:
        description: Current database name
        type: string
      tables:
        description: Tables in the database
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.TableInfo'
        type: array
    type: object
  github_com_tviviano_dashboard_internal_models.SchemaResponse:
    properties:
      duration:
        description: milliseconds
        type: integer
      error:
        type: string
      prometheus_schema:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.PrometheusSchemaInfo'
        description: For Prometheus datasources
      schema:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.SchemaInfo'
        description: For SQL datasources
      success:
        type: boolean
    type: object
  github_com_tviviano_dashboard_internal_models.SendMessageRequest:
    description: Request body for sending a user message
    properties:
      content:
        description: User message content
        type: string
    required:
    - content
    type: object
