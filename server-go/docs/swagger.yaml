basePath: /api
definitions:
  github_com_tviviano_dashboard_internal_models.AIMessage:
    description: A message in the AI conversation
    properties:
      content:
        type: string
      id:
        type: string
      role:
        description: '"user" | "assistant" | "system"'
        type: string
      timestamp:
        type: string
      tool_calls:
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ToolCall'
        type: array
    type: object
  github_com_tviviano_dashboard_internal_models.AISession:
    description: AI session for chart creation/editing
    properties:
      chart_id:
        description: Chart UUID being edited
        type: string
      chart_version:
        description: Version being edited (always a draft)
        type: integer
      created:
        type: string
      id:
        description: UUID
        type: string
      messages:
        description: Conversation history
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.AIMessage'
        type: array
      status:
        description: '"active" | "completed" | "cancelled"'
        type: string
      updated:
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.AISessionResponse:
    description: Response containing AI session state
    properties:
      chart:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.Chart'
        description: Current chart state (draft)
      session:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.AISession'
    type: object
  github_com_tviviano_dashboard_internal_models.APIConfig:
    properties:
      auth_credentials:
        additionalProperties:
          type: string
        type: object
      auth_type:
        description: none, bearer, basic, api-key
        type: string
      body:
        type: string
      headers:
        additionalProperties:
          type: string
        type: object
      method:
        enum:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        type: string
      query_params:
        additionalProperties:
          type: string
        type: object
      response_config:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.APIResponseConfig'
      retry_count:
        type: integer
      retry_delay:
        description: milliseconds
        type: integer
      timeout:
        description: seconds
        type: integer
      url:
        type: string
    required:
    - method
    - url
    type: object
  github_com_tviviano_dashboard_internal_models.APIResponseConfig:
    properties:
      data_path:
        description: |-
          DataPath is the JSON path to the array of records (e.g., "data", "results", "items")
          If empty, assumes response is already an array or will be parsed as key-value pairs
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.CSVConfig:
    properties:
      columns:
        description: explicit column names
        items:
          type: string
        type: array
      delimiter:
        description: 'default: ","'
        type: string
      encoding:
        description: utf-8, ascii, etc.
        type: string
      has_header:
        description: 'default: true'
        type: boolean
      path:
        type: string
      watch_changes:
        type: boolean
    required:
    - path
    type: object
  github_com_tviviano_dashboard_internal_models.Chart:
    description: Chart with data source binding, query config, and visualization settings
    properties:
      ai_session_id:
        description: Active AI session (drafts only)
        type: string
      chart_type:
        description: bar, line, pie, gauge, etc.
        type: string
      component_code:
        description: React component code
        type: string
      created:
        type: string
      data_mapping:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ChartDataMapping'
        description: How to map data to chart
      datasource_id:
        description: Reference to data source
        type: string
      description:
        type: string
      id:
        description: UUID - same across versions
        type: string
      name:
        type: string
      options:
        additionalProperties: true
        description: ECharts options overrides
        type: object
      query_config:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ChartQueryConfig'
        description: How to query data
      status:
        description: '"draft" | "final"'
        type: string
      tags:
        description: Searchable tags
        items:
          type: string
        type: array
      thumbnail:
        description: Base64 preview image for card display
        type: string
      updated:
        type: string
      use_custom_code:
        description: Whether custom code mode is enabled
        type: boolean
      version:
        description: Version number (1, 2, 3...)
        type: integer
    required:
    - name
    type: object
  github_com_tviviano_dashboard_internal_models.ChartDataMapping:
    description: Mapping configuration from data columns to chart axes/series
    properties:
      aggregation:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DataAggregation'
        description: Aggregation to apply (first, last, avg, etc.)
      filters:
        description: Client-side filters applied after data fetch
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DataFilter'
        type: array
      group_by:
        description: Column to group/split series by
        type: string
      label_col:
        description: Column for labels
        type: string
      limit:
        description: Max rows to return
        type: integer
      sort_by:
        description: Column to sort by
        type: string
      sort_order:
        description: asc or desc
        type: string
      x_axis:
        description: Column for X axis (categories)
        type: string
      x_axis_format:
        description: 'Format for X axis values: chart, chart_time, chart_date, chart_datetime,
          short, long, etc.'
        type: string
      x_axis_label:
        description: Label for X axis (e.g., "Time", "Date")
        type: string
      y_axis:
        description: Columns for Y axis (values/series)
        items:
          type: string
        type: array
      y_axis_label:
        description: Label for Y axis (e.g., "Temperature (°F)", "Count")
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.ChartListResponse:
    description: Response containing a list of charts with pagination
    properties:
      charts:
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.Chart'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.ChartQueryConfig:
    description: Query configuration for fetching chart data
    properties:
      params:
        additionalProperties: true
        description: Query parameters
        type: object
      raw:
        description: SQL query, filter, or API path
        type: string
      type:
        description: sql, csv_filter, stream_filter, api
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.ChartSummary:
    description: Minimal chart info for selection cards and lists
    properties:
      chart_type:
        type: string
      datasource_id:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
      tags:
        items:
          type: string
        type: array
      thumbnail:
        type: string
      version:
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.ChartVersionInfo:
    description: Version info for a chart
    properties:
      has_draft:
        description: Whether a draft version exists
        type: boolean
      id:
        type: string
      status:
        type: string
      version:
        type: integer
      version_count:
        description: Total versions for this chart id
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.ColumnInfo:
    properties:
      default:
        description: Default value if any
        type: string
      name:
        description: Column name
        type: string
      nullable:
        description: Whether column allows NULL
        type: boolean
      primary_key:
        description: Whether column is part of primary key
        type: boolean
      type:
        description: Data type (e.g., "varchar", "integer")
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.Component:
    description: Component model for dashboard charts and widgets
    properties:
      component_code:
        type: string
      created:
        type: string
      description:
        type: string
      id:
        type: string
      metadata:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ComponentMetadata'
      name:
        type: string
      source:
        type: string
      system:
        type: string
      updated:
        type: string
    required:
    - component_code
    - name
    - source
    - system
    type: object
  github_com_tviviano_dashboard_internal_models.ComponentListResponse:
    description: Response containing a list of components with pagination
    properties:
      components:
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.Component'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.ComponentMetadata:
    description: Metadata for component categorization and configuration
    properties:
      category:
        type: string
      custom:
        additionalProperties: true
        type: object
      datasourceType:
        type: string
      refreshInterval:
        type: integer
      requiredApis:
        items:
          type: string
        type: array
      tags:
        items:
          type: string
        type: array
      visualization:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.VisualizationConfig'
    type: object
  github_com_tviviano_dashboard_internal_models.ComponentSource:
    description: Source category containing component count
    properties:
      component_count:
        type: integer
      name:
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.ComponentSystem:
    description: System category containing multiple sources
    properties:
      name:
        type: string
      sources:
        additionalProperties:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ComponentSource'
        type: object
    type: object
  github_com_tviviano_dashboard_internal_models.ComponentSystemsResponse:
    description: Response containing component organization hierarchy
    properties:
      systems:
        additionalProperties:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ComponentSystem'
        type: object
    type: object
  github_com_tviviano_dashboard_internal_models.CreateAISessionRequest:
    description: Request body for creating a new AI session
    properties:
      chart_id:
        description: Existing chart ID to edit (optional, omit for new chart)
        type: string
      initial_message:
        description: First user message (optional)
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.CreateChartRequest:
    description: Request body for creating a new chart
    properties:
      chart_type:
        type: string
      component_code:
        type: string
      data_mapping:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ChartDataMapping'
      datasource_id:
        type: string
      description:
        type: string
      name:
        type: string
      options:
        additionalProperties: true
        type: object
      query_config:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ChartQueryConfig'
      tags:
        items:
          type: string
        type: array
      thumbnail:
        type: string
      use_custom_code:
        type: boolean
    required:
    - name
    type: object
  github_com_tviviano_dashboard_internal_models.CreateComponentRequest:
    description: Request body for creating a new component
    properties:
      component_code:
        type: string
      description:
        type: string
      metadata:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ComponentMetadata'
      name:
        type: string
      source:
        type: string
      system:
        type: string
    required:
    - component_code
    - name
    - source
    - system
    type: object
  github_com_tviviano_dashboard_internal_models.CreateDashboardRequest:
    description: Request body for creating a new dashboard
    properties:
      description:
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        type: string
      panels:
        description: Panels with optional chart_id
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DashboardPanel'
        type: array
      settings:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DashboardSettings'
    required:
    - name
    type: object
  github_com_tviviano_dashboard_internal_models.CreateDatasourceRequest:
    properties:
      config:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DatasourceConfig'
      description:
        type: string
      name:
        type: string
      tags:
        items:
          type: string
        type: array
      type:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DatasourceType'
        enum:
        - sql
        - csv
        - socket
        - api
    required:
    - config
    - name
    - type
    type: object
  github_com_tviviano_dashboard_internal_models.CreateLayoutRequest:
    properties:
      description:
        type: string
      grid:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.GridConfig'
      name:
        type: string
      panels:
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.Panel'
        type: array
    required:
    - name
    type: object
  github_com_tviviano_dashboard_internal_models.Dashboard:
    description: Dashboard with panels that reference standalone charts
    properties:
      created:
        type: string
      description:
        type: string
      id:
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        type: string
      panels:
        description: Panels with chart_id references
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DashboardPanel'
        type: array
      settings:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DashboardSettings'
      updated:
        type: string
    required:
    - name
    type: object
  github_com_tviviano_dashboard_internal_models.DashboardListResponse:
    description: Response containing a list of dashboards with pagination
    properties:
      dashboards:
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.Dashboard'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.DashboardPanel:
    description: Panel position and size in the grid with optional chart reference
    properties:
      chart_id:
        description: Reference to chart
        type: string
      h:
        type: integer
      id:
        type: string
      w:
        type: integer
      x:
        type: integer
      "y":
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.DashboardSettings:
    description: Dashboard settings and preferences
    properties:
      allow_export:
        type: boolean
      default_view:
        type: string
      is_public:
        type: boolean
      refresh_interval:
        type: integer
      theme:
        type: string
      timezone:
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.DataAggregation:
    description: Aggregation configuration for data transformation
    properties:
      count:
        description: Row count (for limit)
        type: integer
      field:
        description: Column to aggregate (for min/max/avg/sum)
        type: string
      sort_by:
        description: Column to sort by (for first/last)
        type: string
      type:
        description: first, last, min, max, avg, sum, count, limit
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.DataFilter:
    description: Filter condition for data transformation
    properties:
      field:
        description: Column name to filter on
        type: string
      op:
        description: 'Operator: eq, neq, gt, gte, lt, lte, contains, in, notIn, isNull,
          isNotNull'
        type: string
      value:
        description: Value to compare against (can be array for 'in' operator)
    type: object
  github_com_tviviano_dashboard_internal_models.Datasource:
    properties:
      config:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DatasourceConfig'
      created_at:
        type: string
      description:
        type: string
      health:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.HealthInfo'
      id:
        type: string
      name:
        type: string
      tags:
        items:
          type: string
        type: array
      type:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.DatasourceType'
        enum:
        - sql
        - csv
        - socket
        - api
      updated_at:
        type: string
    required:
    - config
    - name
    - type
    type: object
  github_com_tviviano_dashboard_internal_models.DatasourceConfig:
    properties:
      api:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.APIConfig'
      csv:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.CSVConfig'
      socket:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.SocketConfig'
      sql:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.SQLConfig'
    type: object
  github_com_tviviano_dashboard_internal_models.DatasourceType:
    enum:
    - sql
    - csv
    - socket
    - api
    type: string
    x-enum-varnames:
    - DatasourceTypeSQL
    - DatasourceTypeCSV
    - DatasourceTypeSocket
    - DatasourceTypeAPI
  github_com_tviviano_dashboard_internal_models.GridConfig:
    properties:
      columns:
        description: Number of columns (e.g., 12)
        type: integer
      compact_type:
        description: '"vertical", "horizontal", or null'
        type: string
      grid_unit:
        description: Base spacing unit (32px = $spacing-08)
        type: integer
      max_rows:
        description: Maximum number of rows
        type: integer
      row_height:
        description: Height of each row in pixels
        type: integer
    type: object
  github_com_tviviano_dashboard_internal_models.HealthInfo:
    properties:
      error_message:
        type: string
      last_check:
        type: string
      last_success:
        type: string
      response_time:
        description: milliseconds
        type: integer
      status:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.HealthStatus'
    type: object
  github_com_tviviano_dashboard_internal_models.HealthStatus:
    enum:
    - unknown
    - healthy
    - unhealthy
    - degraded
    type: string
    x-enum-varnames:
    - HealthStatusUnknown
    - HealthStatusHealthy
    - HealthStatusUnhealthy
    - HealthStatusDegraded
  github_com_tviviano_dashboard_internal_models.Layout:
    properties:
      created_at:
        type: string
      description:
        type: string
      grid:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.GridConfig'
      id:
        type: string
      name:
        type: string
      panels:
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.Panel'
        type: array
      updated_at:
        type: string
    required:
    - name
    type: object
  github_com_tviviano_dashboard_internal_models.Panel:
    properties:
      content:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.PanelContent'
        description: Panel content reference
      h:
        description: Height in rows
        minimum: 1
        type: integer
      id:
        description: Unique panel identifier
        type: string
      max_h:
        description: Maximum height
        type: integer
      max_w:
        description: Maximum width
        type: integer
      min_h:
        description: Minimum height
        type: integer
      min_w:
        description: Minimum width
        type: integer
      static:
        description: Cannot be moved/resized
        type: boolean
      w:
        description: Width in columns
        minimum: 1
        type: integer
      x:
        description: Column position (0-indexed)
        type: integer
      "y":
        description: Row position (0-indexed)
        type: integer
    required:
    - h
    - id
    - w
    - x
    - "y"
    type: object
  github_com_tviviano_dashboard_internal_models.PanelContent:
    properties:
      chart_id:
        description: Reference to chart component
        type: string
      component_id:
        description: Reference to custom component
        type: string
      config:
        additionalProperties: true
        description: Panel-specific configuration
        type: object
      type:
        description: '"chart", "text", "image", "custom"'
        type: string
    type: object
  github_com_tviviano_dashboard_internal_models.Query:
    properties:
      params:
        additionalProperties: true
        description: Query parameters
        type: object
      raw:
        description: Raw query string (SQL, filter expression, etc.)
        type: string
      type:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.QueryType'
        description: Query type
    type: object
  github_com_tviviano_dashboard_internal_models.QueryRequest:
    properties:
      query:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.Query'
    required:
    - query
    type: object
  github_com_tviviano_dashboard_internal_models.QueryResponse:
    properties:
      duration:
        description: milliseconds
        type: integer
      error:
        type: string
      result_set:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ResultSet'
      success:
        type: boolean
    type: object
  github_com_tviviano_dashboard_internal_models.QueryType:
    enum:
    - sql
    - csv_filter
    - stream_filter
    - api
    type: string
    x-enum-varnames:
    - QueryTypeSQL
    - QueryTypeCSVFilter
    - QueryTypeStreamFilter
    - QueryTypeAPI
  github_com_tviviano_dashboard_internal_models.ResultSet:
    properties:
      columns:
        description: Column names
        items:
          type: string
        type: array
      metadata:
        additionalProperties: true
        description: Additional metadata
        type: object
      rows:
        description: Data rows
        items:
          items: {}
          type: array
        type: array
    type: object
  github_com_tviviano_dashboard_internal_models.SQLConfig:
    properties:
      connection_string:
        type: string
      database:
        type: string
      driver:
        enum:
        - postgres
        - mysql
        - sqlite
        - mssql
        - oracle
        type: string
      host:
        type: string
      max_connections:
        type: integer
      options:
        additionalProperties:
          type: string
        type: object
      password:
        type: string
      port:
        type: integer
      ssl:
        type: boolean
      timeout:
        description: seconds
        type: integer
      username:
        type: string
    required:
    - connection_string
    - driver
    type: object
  github_com_tviviano_dashboard_internal_models.SchemaInfo:
    properties:
      database:
        description: Current database name
        type: string
      tables:
        description: Tables in the database
        items:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.TableInfo'
        type: array
    type: object
  github_com_tviviano_dashboard_internal_models.SchemaResponse:
    properties:
      duration:
        description: milliseconds
        type: integer
      error:
        type: string
      schema:
        $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.SchemaInfo'
      success:
        type: boolean
    type: object
  github_com_tviviano_dashboard_internal_models.SendMessageRequest:
    description: Request body for sending a user message
    properties:
      content:
        description: User message content
        type: string
    required:
    - content
    type: object
  github_com_tviviano_dashboard_internal_models.SocketConfig:
    properties:
      buffer_size:
        description: number of messages to buffer
        type: integer
      headers:
        additionalProperties:
          type: string
        type: object
      message_format:
        description: json, text, binary
        type: string
      parser:
        allOf:
        - $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.SocketParserConfig'
        description: parser configuration
      ping_interval:
        description: seconds
        type: integer
      protocol:
        enum:
        - tcp
        - udp
        - websocket
        type: string
      reconnect_delay:
        description: milliseconds
        type: integer
      reconnect_on_error:
        type: boolean
      url:
        type: string
    required:
    - protocol
    - url
    type: object
  github_com_tviviano_dashboard_internal_models.SocketParserConfig:
    properties:
      data_path:
        description: |-
          DataPath is the JSON path to the data payload (e.g., "data", "payload", "message.readings")
          Supports dot notation for nested paths. If empty, treats entire message as the data object.
        type: string
      exclude_fields:
        description: ExcludeFields removes these fields from output
        items:
          type: string
        type: array
      field_mappings:
        additionalProperties:
          type: string
        description: 'FieldMappings renames fields in the output (e.g., {"temp": "temperature",
          "ts": "timestamp"})'
        type: object
      include_fields:
        description: IncludeFields limits output to only these fields (empty = include
          all)
        items:
          type: string
        type: array
      timestamp_field:
        description: 'TimestampField specifies which field contains the timestamp
          (default: use server receive time)'
        type: string
      timestamp_format:
        description: |-
          TimestampFormat is the Go time format string for parsing timestamps (default: RFC3339)
          Common formats: "2006-01-02T15:04:05Z07:00" (RFC3339), "2006-01-02 15:04:05", unix timestamp
        type: string
    type: object
