host: localhost:3001
info:
  contact:
    email: support@example.com
    name: Dashboard Team
  description: Dashboard system with AI-powered chart generation
  title: GiVi-Solution Dashboard API
  version: "1.0"
paths:
  /ai/sessions:
    post:
      consumes:
      - application/json
      description: Create a new AI session for chart creation or editing. Creates
        a chart draft.
      parameters:
      - description: Session creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.CreateAISessionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.AISessionResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Create a new AI session
      tags:
      - ai
  /ai/sessions/{id}:
    delete:
      description: Cancel the AI session and discard the draft
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Cancel AI session
      tags:
      - ai
    get:
      description: Get an AI session by ID with current chart state
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.AISessionResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get AI session
      tags:
      - ai
  /ai/sessions/{id}/messages:
    post:
      consumes:
      - application/json
      description: Send a user message to an AI session. The AI agent will process
        the message asynchronously.
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      - description: Message content
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.SendMessageRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Message accepted for processing
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Send message to AI session
      tags:
      - ai
  /ai/sessions/{id}/save:
    post:
      consumes:
      - application/json
      description: Save the AI session by publishing the draft as a new final version
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      - description: Chart name
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.SaveSessionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.Chart'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Save AI session (publish draft)
      tags:
      - ai
  /ai/sessions/{id}/ws:
    get:
      description: Subscribe to real-time updates for an AI session via WebSocket
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Subscribe to AI session events via WebSocket
      tags:
      - ai
  /api/ai/debug:
    get:
      description: Stream real-time debug events from the AI agent including LLM requests,
        responses, and tool calls
      produces:
      - application/json
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
      summary: Connect to AI debug WebSocket
      tags:
      - debug
  /api/ai/debug/status:
    get:
      description: Get the current status of the AI debug system
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get debug status
      tags:
      - debug
  /api/settings:
    get:
      consumes:
      - application/json
      description: Get all settings that can be modified by administrators
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.SettingsListResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all user-configurable settings
      tags:
      - settings
  /api/settings/{key}:
    get:
      consumes:
      - application/json
      description: Get a single setting by key
      parameters:
      - description: Setting key
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ConfigItem'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a single setting
      tags:
      - settings
    put:
      consumes:
      - application/json
      description: Update the value of a user-configurable setting
      parameters:
      - description: Setting key
        in: path
        name: key
        required: true
        type: string
      - description: New value for the setting
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.UpdateSettingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ConfigItem'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a setting
      tags:
      - settings
  /auth/me:
    get:
      description: Returns the authenticated user's ID, name, and capabilities
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.UserCapabilitiesResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get current user capabilities
      tags:
      - Auth
  /charts:
    get:
      description: Get a paginated list of charts (latest version of each) with optional
        filtering
      parameters:
      - description: Filter by name (partial match)
        in: query
        name: name
        type: string
      - description: Filter by chart type
        in: query
        name: chart_type
        type: string
      - description: Filter by data source ID
        in: query
        name: datasource_id
        type: string
      - description: Filter by tag
        in: query
        name: tag
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_tviviano_dashboard_internal_models.ChartListResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List charts
      tags:
      - charts
