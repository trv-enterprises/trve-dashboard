      ping_interval:
        description: seconds
        type: integer
      protocol:
        enum:
        - tcp
        - udp
        - websocket
        type: string
      reconnect_delay:
        description: milliseconds
        type: integer
      reconnect_on_error:
        type: boolean
      url:
        type: string
    required:
    - protocol
    - url
    type: object
  models.SocketParserConfig:
    properties:
      data_path:
        description: |-
          DataPath is the JSON path to the data payload (e.g., "data", "payload", "message.readings")
          Supports dot notation for nested paths. If empty, treats entire message as the data object.
        type: string
      exclude_fields:
        description: ExcludeFields removes these fields from output
        items:
          type: string
        type: array
      field_mappings:
        additionalProperties:
          type: string
        description: 'FieldMappings renames fields in the output (e.g., {"temp": "temperature",
          "ts": "timestamp"})'
        type: object
      include_fields:
        description: IncludeFields limits output to only these fields (empty = include
          all)
        items:
          type: string
        type: array
      timestamp_field:
        description: 'TimestampField specifies which field contains the timestamp
          (default: use server receive time)'
        type: string
      timestamp_format:
        description: |-
          TimestampFormat is the Go time format string for parsing timestamps (default: RFC3339)
          Common formats: "2006-01-02T15:04:05Z07:00" (RFC3339), "2006-01-02 15:04:05", unix timestamp
        type: string
    type: object
