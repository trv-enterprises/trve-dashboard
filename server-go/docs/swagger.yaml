basePath: /api
definitions:
  handlers.CategoryInfo:
    properties:
      display_name:
        type: string
      name:
        type: string
      type_count:
        type: integer
    type: object
  handlers.ExecuteCommandRequest:
    properties:
      action:
        type: string
      payload:
        additionalProperties: true
        type: object
      target:
        type: string
    required:
    - action
    type: object
  handlers.ExecuteCommandResponse:
    properties:
      data:
        additionalProperties: true
        type: object
      message:
        type: string
      success:
        type: boolean
      timestamp:
        type: string
    type: object
  handlers.ExecuteControlRequest:
    properties:
      value:
        description: The value from the control (bool, number, string, or null for
          buttons)
    type: object
  handlers.ListCategoriesResponse:
    properties:
      categories:
        items:
          $ref: '#/definitions/handlers.CategoryInfo'
        type: array
    type: object
  handlers.ListConnectionTypesResponse:
    properties:
      categories:
        items:
          type: string
        type: array
      count:
        type: integer
      types:
        items:
          $ref: '#/definitions/registry.TypeInfo'
        type: array
    type: object
  handlers.LoginRequest:
    properties:
      key:
        description: User GUID/key
        type: string
    required:
    - key
    type: object
  handlers.LoginResponse:
    properties:
      can_design:
        type: boolean
      can_manage:
        type: boolean
      capabilities:
        items:
          type: string
        type: array
      email:
        type: string
      guid:
        type: string
      name:
        type: string
    type: object
  handlers.SaveSessionRequest:
    properties:
      name:
        type: string
    type: object
  handlers.StreamAggregatedRequest:
    properties:
      function:
        description: avg, min, max, sum, count
        type: string
      interval:
        description: Bucket interval in seconds
        type: integer
      series_col:
        description: Column to partition by (e.g., "location") - optional
        type: string
      timestamp_col:
        description: Timestamp column
        type: string
      value_cols:
        description: Columns to aggregate
        items:
          type: string
        type: array
    required:
    - function
    - interval
    - timestamp_col
    - value_cols
    type: object
  mcp.JSONRPCError:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  mcp.JSONRPCRequest:
    properties:
      id: {}
      jsonrpc:
        type: string
      method:
        type: string
      params:
        additionalProperties: true
        type: object
    type: object
  mcp.JSONRPCResponse:
    properties:
      error:
        $ref: '#/definitions/mcp.JSONRPCError'
      id: {}
      jsonrpc:
        type: string
      result: {}
    type: object
  models.AIMessage:
    description: A message in the AI conversation
    properties:
      content:
        type: string
      id:
        type: string
      role:
        description: '"user" | "assistant" | "system"'
        type: string
      timestamp:
        type: string
      tool_calls:
        items:
          $ref: '#/definitions/models.ToolCall'
        type: array
    type: object
  models.AISession:
    description: AI session for chart creation/editing
    properties:
      chart_id:
        description: Chart UUID being edited
        type: string
      chart_version:
        description: Version being edited (always a draft)
        type: integer
      created:
        type: string
      dashboard_id:
        description: Auto-attach to this dashboard on save
        type: string
      expires_at:
        type: string
      id:
        description: UUID
        type: string
      messages:
        description: Conversation history
        items:
          $ref: '#/definitions/models.AIMessage'
        type: array
      panel_id:
        description: Auto-attach to this panel on save
        type: string
      status:
        description: '"active" | "completed" | "cancelled"'
        type: string
      updated:
        type: string
    type: object
  models.AISessionResponse:
    description: Response containing AI session state
    properties:
      chart:
        allOf:
        - $ref: '#/definitions/models.Chart'
        description: Current chart state (draft)
      session:
        $ref: '#/definitions/models.AISession'
    type: object
  models.APIConfig:
    properties:
      auth_credentials:
        additionalProperties:
          type: string
        type: object
      auth_type:
        description: none, bearer, basic, api-key
        type: string
      body:
        description: Request body template
        type: string
      headers:
        additionalProperties:
          type: string
        description: Request headers
        type: object
      method:
        description: HTTP method (GET, POST, etc.)
        type: string
      query_params:
        additionalProperties:
          type: string
        description: Query parameters
        type: object
      response_config:
        allOf:
        - $ref: '#/definitions/models.APIResponseConfig'
        description: Response parsing config
      retry_count:
        type: integer
      retry_delay:
        description: milliseconds
        type: integer
      timeout:
        description: seconds
        type: integer
      url:
        description: Full API endpoint URL
        type: string
    required:
    - url
    type: object
  models.APIResponseConfig:
    properties:
      data_path:
        description: |-
          DataPath is the JSON path to the array of records (e.g., "data", "results", "items")
          If empty, assumes response is already an array or will be parsed as key-value pairs
        type: string
    type: object
  models.CSVConfig:
    properties:
      columns:
        description: explicit column names
        items:
          type: string
        type: array
      delimiter:
        description: 'default: ","'
        type: string
      encoding:
        description: utf-8, ascii, etc.
        type: string
      has_header:
        description: 'default: true'
        type: boolean
      path:
        type: string
      watch_changes:
        type: boolean
    required:
    - path
    type: object
  models.Capability:
    enum:
    - view
    - design
    - manage
    type: string
    x-enum-varnames:
    - CapabilityView
    - CapabilityDesign
    - CapabilityManage
  models.Chart:
    description: Chart/Control with data source binding, query config, and visualization
      settings
    properties:
      ai_session_id:
        description: Active AI session (drafts only)
        type: string
      chart_type:
        description: bar, line, pie, gauge, etc. (charts only)
        type: string
      component_code:
        description: React component code
        type: string
      component_type:
        description: '"chart" (default) | "control"'
        type: string
      connection_id:
        description: Reference to connection
        type: string
      control_config:
        allOf:
        - $ref: '#/definitions/models.ControlConfig'
        description: Control configuration (controls only)
      created:
        type: string
      data_mapping:
        allOf:
        - $ref: '#/definitions/models.ChartDataMapping'
        description: How to map data to chart (charts only)
      description:
        type: string
      display_config:
        allOf:
        - $ref: '#/definitions/models.DisplayConfig'
        description: Display configuration (displays only)
      id:
        description: UUID - same across versions
        type: string
      name:
        description: Unique identifier
        type: string
      options:
        additionalProperties: true
        description: ECharts options overrides (charts only)
        type: object
      query_config:
        allOf:
        - $ref: '#/definitions/models.ChartQueryConfig'
        description: How to query data (charts only)
      status:
        description: '"draft" | "final"'
        type: string
      tags:
        description: Searchable tags
        items:
          type: string
        type: array
      thumbnail:
        description: Base64 preview image for card display
        type: string
      title:
        description: Display title (defaults to Name if empty)
        type: string
      updated:
        type: string
      use_custom_code:
        description: Whether custom code mode is enabled
        type: boolean
      version:
        description: Version number (1, 2, 3...)
        type: integer
    required:
    - name
    type: object
  models.ChartDataMapping:
    description: Mapping configuration from data columns to chart axes/series
    properties:
      aggregation:
        allOf:
        - $ref: '#/definitions/models.DataAggregation'
        description: Aggregation to apply (first, last, avg, etc.)
      column_aliases:
        additionalProperties:
          type: string
        description: Display names for columns (column name -> display name), primarily
          for dataview
        type: object
      filters:
        description: Client-side filters applied after data fetch
        items:
          $ref: '#/definitions/models.DataFilter'
        type: array
      group_by:
        description: Column to group/split series by (client-side grouping)
        type: string
      label_col:
        description: Column for labels
        type: string
      limit:
        description: Max rows to return
        type: integer
      series:
        description: Column that identifies each series (e.g., "location") - used
          for time bucket partitioning
        type: string
      sliding_window:
        allOf:
        - $ref: '#/definitions/models.SlidingWindow'
        description: Time-based sliding window (e.g., last 5 minutes)
      sort_by:
        description: Column to sort by
        type: string
      sort_order:
        description: asc or desc
        type: string
      time_bucket:
        allOf:
        - $ref: '#/definitions/models.TimeBucket'
        description: Time-bucketed aggregation for streaming data
      x_axis:
        description: Column for X axis (categories)
        type: string
      x_axis_format:
        description: 'Format for X axis values: chart, chart_time, chart_date, chart_datetime,
          short, long, etc.'
        type: string
      x_axis_label:
        description: Label for X axis (e.g., "Time", "Date")
        type: string
      y_axis:
        description: Columns for Y axis (values/series)
        items:
          type: string
        type: array
      y_axis_label:
        description: Label for Y axis (e.g., "Temperature (°F)", "Count")
        type: string
    type: object
  models.ChartListResponse:
    description: Response containing a list of charts with pagination
    properties:
      charts:
        items:
          $ref: '#/definitions/models.Chart'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  models.ChartQueryConfig:
    description: Query configuration for fetching chart data
    properties:
      params:
        additionalProperties: true
        description: Query parameters
        type: object
      raw:
        description: SQL query, filter, or API path
        type: string
      type:
        description: sql, csv_filter, stream_filter, api
        type: string
    type: object
  models.ChartSummary:
    description: Minimal chart info for selection cards and lists
    properties:
      chart_type:
        type: string
      component_type:
        type: string
      connection_id:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      status:
        type: string
      tags:
        items:
          type: string
        type: array
      thumbnail:
        type: string
      version:
        type: integer
    type: object
  models.ChartVersionInfo:
    description: Version info for a chart
    properties:
      has_draft:
        description: Whether a draft version exists
        type: boolean
      id:
        type: string
      status:
        type: string
      version:
        type: integer
      version_count:
        description: Total versions for this chart id
        type: integer
    type: object
  models.ColumnInfo:
    properties:
      default:
        description: Default value if any
        type: string
      name:
        description: Column name
        type: string
      nullable:
        description: Whether column allows NULL
        type: boolean
      primary_key:
        description: Whether column is part of primary key
        type: boolean
      type:
        description: Data type (e.g., "varchar", "integer")
        type: string
    type: object
  models.CommandConfig:
    description: Configuration for sending commands via a connection
    properties:
      action:
        description: Command action name
        type: string
      payload_template:
        additionalProperties: true
        description: Template with {{value}} placeholder
        type: object
      target:
        description: Optional target identifier
        type: string
    type: object
  models.CommandDef:
    description: Template for formatting control commands
    properties:
      template:
        additionalProperties: true
        description: Message template with {{value}}, {{target}} placeholders
        type: object
      value_map:
        additionalProperties: true
        description: Optional value mapping (e.g., true -> "ON", false -> "OFF")
        type: object
    type: object
  models.ConfigItem:
    properties:
      category:
        description: Grouping category (e.g., "layout")
        type: string
      created:
        type: string
      description:
        description: Human-readable description
        type: string
      id:
        description: Unique key (e.g., "layout_dimensions")
        type: string
      key:
        description: Same as ID, for clarity
        type: string
      updated:
        type: string
      value:
        description: The setting value
    type: object
  models.ControlConfig:
    description: Configuration for interactive control components (buttons, toggles,
      etc.)
    properties:
      command_config:
        allOf:
        - $ref: '#/definitions/models.CommandConfig'
        description: Legacy command configuration (deprecated, use device type instead)
      control_type:
        description: button, toggle, slider, text_input
        type: string
      device_type_id:
        description: Device type-based control configuration (preferred)
        type: string
      target:
        description: Device/endpoint identifier for template interpolation
        type: string
      ui_config:
        additionalProperties: true
        description: UI configuration
        type: object
    type: object
  models.CreateAISessionRequest:
    description: Request body for creating a new AI session
    properties:
      chart_id:
        description: Existing chart ID to edit (optional, omit for new chart)
        type: string
      chart_type:
        description: 'For charts: bar, line, pie, etc.'
        type: string
      component_type:
        description: Pre-flight context (optional) - sets fields on the draft directly
        type: string
      connection_id:
        description: Pre-selected connection ID
        type: string
      control_type:
        description: 'For controls: button, toggle, slider, etc.'
        type: string
      dashboard_id:
        description: Dashboard panel context (optional) - if set, saved component
          is auto-attached to this panel
        type: string
      initial_message:
        description: First user message (optional)
        type: string
      panel_id:
        description: Panel within the dashboard
        type: string
    type: object
  models.CreateChartRequest:
    description: Request body for creating a new chart or control
    properties:
      chart_type:
        type: string
      component_code:
        type: string
      component_type:
        description: '"chart" (default) | "control"'
        type: string
      connection_id:
        type: string
      control_config:
        $ref: '#/definitions/models.ControlConfig'
      data_mapping:
        $ref: '#/definitions/models.ChartDataMapping'
      description:
        type: string
      display_config:
        $ref: '#/definitions/models.DisplayConfig'
      name:
        type: string
      options:
        additionalProperties: true
        type: object
      query_config:
        $ref: '#/definitions/models.ChartQueryConfig'
      tags:
        items:
          type: string
        type: array
      thumbnail:
        type: string
      title:
        type: string
      use_custom_code:
        type: boolean
    required:
    - name
    type: object
  models.CreateDashboardRequest:
    description: Request body for creating a new dashboard
    properties:
      description:
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        type: string
      panels:
        description: Panels with optional chart_id
        items:
          $ref: '#/definitions/models.DashboardPanel'
        type: array
      settings:
        $ref: '#/definitions/models.DashboardSettings'
      tags:
        items:
          type: string
        type: array
    required:
    - name
    type: object
  models.CreateDatasourceRequest:
    properties:
      config:
        $ref: '#/definitions/models.DatasourceConfig'
      description:
        type: string
      mask_secrets:
        description: 'If true, secrets are masked in API responses (default: true)'
        type: boolean
      name:
        type: string
      supported_schemas:
        items:
          type: string
        type: array
      tags:
        items:
          type: string
        type: array
      type:
        allOf:
        - $ref: '#/definitions/models.DatasourceType'
        description: 'LEGACY: Keep for backwards compatibility'
      type_config:
        additionalProperties: true
        type: object
      type_id:
        description: 'NEW: Registry-based type system (preferred)'
        type: string
    required:
    - name
    type: object
  models.CreateDeviceRequest:
    description: Request body for creating a new device
    properties:
      connection_id:
        type: string
      device_type_id:
        type: string
      enabled:
        type: boolean
      metadata:
        additionalProperties: true
        type: object
      name:
        type: string
      room:
        type: string
      state_topic:
        type: string
      tags:
        items:
          type: string
        type: array
      target:
        type: string
    required:
    - connection_id
    - device_type_id
    - name
    - target
    type: object
  models.CreateDeviceTypeRequest:
    description: Request body for creating a new device type
    properties:
      capabilities:
        items:
          $ref: '#/definitions/models.DeviceCapability'
        type: array
      category:
        type: string
      commands:
        additionalProperties:
          $ref: '#/definitions/models.CommandDef'
        type: object
      description:
        type: string
      id:
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        type: string
      protocol:
        type: string
      response:
        $ref: '#/definitions/models.ResponseDef'
      state_query:
        $ref: '#/definitions/models.StateQueryDef'
      subtype:
        type: string
      supported_types:
        items:
          type: string
        type: array
    required:
    - category
    - id
    - name
    - protocol
    type: object
  models.CreateUserRequest:
    description: Request body for creating a new user
    properties:
      capabilities:
        items:
          $ref: '#/definitions/models.Capability'
        type: array
      email:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  models.Dashboard:
    description: Dashboard with panels that reference standalone charts
    properties:
      created:
        type: string
      description:
        type: string
      id:
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        type: string
      panels:
        description: Panels with chart_id references
        items:
          $ref: '#/definitions/models.DashboardPanel'
        type: array
      settings:
        $ref: '#/definitions/models.DashboardSettings'
      tags:
        description: User-defined tags for filtering/grouping
        items:
          type: string
        type: array
      thumbnail:
        description: Base64 encoded thumbnail image
        type: string
      updated:
        type: string
    required:
    - name
    type: object
  models.DashboardListResponse:
    description: Response containing a list of dashboards with pagination
    properties:
      dashboards:
        items:
          $ref: '#/definitions/models.Dashboard'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  models.DashboardPanel:
    description: Panel position and size in the grid with optional chart reference
      or text config
    properties:
      chart_id:
        description: Reference to chart component
        type: string
      h:
        type: integer
      id:
        type: string
      text_config:
        allOf:
        - $ref: '#/definitions/models.PanelTextConfig'
        description: Native text panel config
      w:
        type: integer
      x:
        type: integer
      "y":
        type: integer
    type: object
  models.DashboardSettings:
    description: Dashboard settings and preferences
    properties:
      allow_export:
        type: boolean
      default_view:
        type: string
      is_public:
        type: boolean
      layout_dimension:
        type: string
      refresh_interval:
        type: integer
      theme:
        type: string
      timezone:
        type: string
      title_scale:
        description: Title font scale % (default 100, range 50-200)
        type: integer
    type: object
  models.DashboardSummary:
    description: Dashboard info with optional data source names for display in tiles
    properties:
      created:
        type: string
      datasource_names:
        description: Unique data source names used by charts
        items:
          type: string
        type: array
      description:
        type: string
      id:
        type: string
      name:
        type: string
      panel_count:
        type: integer
      settings:
        $ref: '#/definitions/models.DashboardSettings'
      tags:
        items:
          type: string
        type: array
      thumbnail:
        type: string
      updated:
        type: string
    type: object
  models.DashboardSummaryListResponse:
    description: Response containing dashboard summaries with optional data source
      info
    properties:
      dashboards:
        items:
          $ref: '#/definitions/models.DashboardSummary'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  models.DataAggregation:
    description: Aggregation configuration for data transformation
    properties:
      count:
        description: Row count (for limit)
        type: integer
      field:
        description: Column to aggregate (for min/max/avg/sum)
        type: string
      sort_by:
        description: Column to sort by (for first/last)
        type: string
      type:
        description: first, last, min, max, avg, sum, count, limit
        type: string
    type: object
  models.DataFilter:
    description: Filter condition for data transformation
    properties:
      field:
        description: Column name to filter on
        type: string
      op:
        description: 'Operator: eq, neq, gt, gte, lt, lte, contains, in, notIn, isNull,
          isNotNull'
        type: string
      value:
        description: Value to compare against (can be array for 'in' operator)
    type: object
  models.Datasource:
    properties:
      config:
        $ref: '#/definitions/models.DatasourceConfig'
      created_at:
        type: string
      description:
        type: string
      health:
        $ref: '#/definitions/models.HealthInfo'
      id:
        type: string
      mask_secrets:
        description: If true, secrets are masked in API responses
        type: boolean
      name:
        type: string
      supported_schemas:
        description: Control schema support - which control schemas this connection
          supports
        items:
          type: string
        type: array
      tags:
        items:
          type: string
        type: array
      type:
        allOf:
        - $ref: '#/definitions/models.DatasourceType'
        description: 'LEGACY: Keep for backwards compatibility during migration'
      type_config:
        additionalProperties: true
        type: object
      type_id:
        description: |-
          NEW: Registry-based type system (preferred)
          TypeID format: "category.name" (e.g., "db.postgres", "stream.websocket-bidir")
        type: string
      updated_at:
        type: string
    required:
    - name
    type: object
  models.DatasourceConfig:
    properties:
      api:
        $ref: '#/definitions/models.APIConfig'
      csv:
        $ref: '#/definitions/models.CSVConfig'
      edgelake:
        $ref: '#/definitions/models.EdgeLakeConfig'
      frigate:
        $ref: '#/definitions/models.FrigateConfig'
      mqtt:
        $ref: '#/definitions/models.MQTTConfig'
      prometheus:
        $ref: '#/definitions/models.PrometheusConfig'
      socket:
        $ref: '#/definitions/models.SocketConfig'
      sql:
        $ref: '#/definitions/models.SQLConfig'
      tsstore:
        $ref: '#/definitions/models.TSStoreConfig'
    type: object
  models.DatasourceType:
    enum:
    - sql
    - csv
    - socket
    - api
    - tsstore
    - prometheus
    - edgelake
    - mqtt
    - frigate
    type: string
    x-enum-varnames:
    - DatasourceTypeSQL
    - DatasourceTypeCSV
    - DatasourceTypeSocket
    - DatasourceTypeAPI
    - DatasourceTypeTSStore
    - DatasourceTypePrometheus
    - DatasourceTypeEdgeLake
    - DatasourceTypeMQTT
    - DatasourceTypeFrigate
  models.Device:
    description: A specific device instance with connection and topic bindings
    properties:
      connection_id:
        type: string
      created:
        type: string
      device_type_id:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        type: string
      room:
        type: string
      state_topic:
        type: string
      tags:
        items:
          type: string
        type: array
      target:
        type: string
      updated:
        type: string
