        type: integer
      connected:
        type: boolean
      datasourceID:
        type: string
      lastError: {}
      subscriberCount:
        type: integer
    type: object
host: localhost:3001
info:
  contact:
    email: support@example.com
    name: Dashboard Team
  description: Dashboard system with AI-powered chart generation
  title: GiVi-Solution Dashboard API
  version: "1.0"
paths:
  /ai/sessions:
    post:
      consumes:
      - application/json
      description: Create a new AI session for chart creation or editing. Creates
        a chart draft.
      parameters:
      - description: Session creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateAISessionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.AISessionResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Create a new AI session
      tags:
      - ai
  /ai/sessions/{id}:
    delete:
      description: Cancel the AI session and discard the draft
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Cancel AI session
      tags:
      - ai
    get:
      description: Get an AI session by ID with current chart state
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
