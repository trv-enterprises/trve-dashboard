        items:
          $ref: '#/definitions/models.DashboardPanel'
        type: array
      settings:
        $ref: '#/definitions/models.DashboardSettings'
      thumbnail:
        type: string
    type: object
  models.UpdateDatasourceRequest:
    properties:
