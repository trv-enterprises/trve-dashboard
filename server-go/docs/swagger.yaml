basePath: /api
definitions:
  handlers.SaveSessionRequest:
    properties:
      name:
        type: string
    type: object
  mcp.JSONRPCError:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  mcp.JSONRPCRequest:
    properties:
      id: {}
      jsonrpc:
        type: string
      method:
        type: string
      params:
        additionalProperties: true
        type: object
    type: object
  mcp.JSONRPCResponse:
    properties:
      error:
        $ref: '#/definitions/mcp.JSONRPCError'
      id: {}
      jsonrpc:
        type: string
      result: {}
    type: object
  models.AIMessage:
    description: A message in the AI conversation
    properties:
      content:
        type: string
      id:
        type: string
      role:
        description: '"user" | "assistant" | "system"'
        type: string
      timestamp:
        type: string
      tool_calls:
        items:
          $ref: '#/definitions/models.ToolCall'
        type: array
    type: object
  models.AISession:
    description: AI session for chart creation/editing
    properties:
      chart_id:
        description: Chart UUID being edited
        type: string
      chart_version:
        description: Version being edited (always a draft)
        type: integer
      created:
        type: string
      id:
        description: UUID
        type: string
      messages:
        description: Conversation history
        items:
          $ref: '#/definitions/models.AIMessage'
        type: array
      status:
        description: '"active" | "completed" | "cancelled"'
        type: string
      updated:
        type: string
    type: object
  models.AISessionResponse:
    description: Response containing AI session state
    properties:
      chart:
        allOf:
        - $ref: '#/definitions/models.Chart'
        description: Current chart state (draft)
      session:
        $ref: '#/definitions/models.AISession'
    type: object
  models.APIConfig:
    properties:
      auth_credentials:
        additionalProperties:
          type: string
        type: object
      auth_type:
        description: none, bearer, basic, api-key
        type: string
      body:
        type: string
      headers:
        additionalProperties:
          type: string
        type: object
      method:
        enum:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        type: string
      query_params:
        additionalProperties:
          type: string
        type: object
      response_config:
        $ref: '#/definitions/models.APIResponseConfig'
      retry_count:
        type: integer
      retry_delay:
        description: milliseconds
        type: integer
      timeout:
        description: seconds
        type: integer
      url:
        type: string
    required:
    - method
    - url
    type: object
  models.APIResponseConfig:
    properties:
      data_path:
        description: |-
          DataPath is the JSON path to the array of records (e.g., "data", "results", "items")
          If empty, assumes response is already an array or will be parsed as key-value pairs
        type: string
    type: object
  models.CSVConfig:
    properties:
      columns:
        description: explicit column names
        items:
          type: string
        type: array
      delimiter:
        description: 'default: ","'
        type: string
      encoding:
        description: utf-8, ascii, etc.
        type: string
      has_header:
        description: 'default: true'
        type: boolean
      path:
        type: string
      watch_changes:
        type: boolean
    required:
    - path
    type: object
  models.Chart:
    description: Chart with data source binding, query config, and visualization settings
    properties:
      ai_session_id:
        description: Active AI session (drafts only)
        type: string
      chart_type:
        description: bar, line, pie, gauge, etc.
        type: string
      component_code:
        description: React component code
        type: string
      created:
        type: string
      data_mapping:
        allOf:
        - $ref: '#/definitions/models.ChartDataMapping'
        description: How to map data to chart
      datasource_id:
        description: Reference to data source
        type: string
      description:
        type: string
      id:
        description: UUID - same across versions
        type: string
      name:
        type: string
      options:
        additionalProperties: true
        description: ECharts options overrides
        type: object
      query_config:
        allOf:
        - $ref: '#/definitions/models.ChartQueryConfig'
        description: How to query data
      status:
        description: '"draft" | "final"'
        type: string
      tags:
        description: Searchable tags
        items:
          type: string
        type: array
      thumbnail:
        description: Base64 preview image for card display
        type: string
      updated:
        type: string
      use_custom_code:
        description: Whether custom code mode is enabled
        type: boolean
      version:
        description: Version number (1, 2, 3...)
        type: integer
    required:
    - name
    type: object
  models.ChartDataMapping:
    description: Mapping configuration from data columns to chart axes/series
    properties:
      aggregation:
        allOf:
        - $ref: '#/definitions/models.DataAggregation'
        description: Aggregation to apply (first, last, avg, etc.)
      filters:
        description: Client-side filters applied after data fetch
        items:
          $ref: '#/definitions/models.DataFilter'
        type: array
      group_by:
        description: Column to group/split series by
        type: string
      label_col:
        description: Column for labels
        type: string
      limit:
        description: Max rows to return
        type: integer
      sort_by:
        description: Column to sort by
        type: string
      sort_order:
        description: asc or desc
        type: string
      x_axis:
        description: Column for X axis (categories)
        type: string
      x_axis_format:
        description: 'Format for X axis values: chart, chart_time, chart_date, chart_datetime,
          short, long, etc.'
        type: string
      x_axis_label:
        description: Label for X axis (e.g., "Time", "Date")
        type: string
      y_axis:
        description: Columns for Y axis (values/series)
        items:
          type: string
        type: array
      y_axis_label:
        description: Label for Y axis (e.g., "Temperature (°F)", "Count")
        type: string
    type: object
  models.ChartListResponse:
    description: Response containing a list of charts with pagination
    properties:
      charts:
        items:
          $ref: '#/definitions/models.Chart'
        type: array
      page:
